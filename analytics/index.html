<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Party - Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      padding: 32px;
      min-height: 100vh;
    }

    h1 {
      color: #CC5500;
      font-size: 16px;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #444;
      font-size: 7px;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    /* ── Stat Grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #111;
      border: 1px solid #222;
      padding: 16px;
      position: relative;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: #CC5500;
    }

    .stat-label {
      color: #555;
      font-size: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      color: #CC5500;
      font-size: 20px;
    }

    .stat-sub {
      color: #444;
      font-size: 6px;
      margin-top: 4px;
    }

    /* ── Character Bar Chart ── */
    .section-title {
      color: #666;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
    }

    .section {
      margin-bottom: 32px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-label {
      width: 90px;
      font-size: 7px;
      color: #888;
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 16px;
      background: #1a1a1a;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      background: #CC5500;
      transition: width 0.5s ease;
      min-width: 2px;
    }

    .bar-count {
      width: 40px;
      font-size: 7px;
      color: #555;
      flex-shrink: 0;
    }

    /* ── Recent Triggers ── */
    .trigger-table {
      width: 100%;
      border-collapse: collapse;
    }

    .trigger-table th {
      text-align: left;
      color: #444;
      font-size: 6px;
      letter-spacing: 1px;
      padding: 6px 8px;
      border-bottom: 1px solid #1a1a1a;
    }

    .trigger-table td {
      font-size: 7px;
      color: #666;
      padding: 8px;
      border-bottom: 1px solid #141414;
      vertical-align: top;
    }

    .trigger-table tr:hover td {
      background: #111;
    }

    .type-badge {
      display: inline-block;
      padding: 2px 5px;
      font-size: 5px;
      letter-spacing: 1px;
      background: #1a1a1a;
      color: #555;
    }

    .type-badge.hotkey { border-left: 2px solid #CC5500; }
    .type-badge.chat_trigger { border-left: 2px solid #7b68ee; }
    .type-badge.timed { border-left: 2px solid #556b2f; }

    .char-pill {
      display: inline-block;
      padding: 2px 4px;
      font-size: 5px;
      background: #1a1a1a;
      color: #666;
      margin-right: 2px;
    }

    /* ── Status ── */
    #refresh-btn {
      background: none;
      border: 1px solid #CC5500;
      color: #CC5500;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 16px;
      cursor: pointer;
      margin-bottom: 24px;
    }

    #refresh-btn:hover { background: #CC5500; color: #0d0d0d; }

    #last-updated {
      display: inline-block;
      margin-left: 16px;
      font-size: 6px;
      color: #333;
    }

    #error-msg {
      color: #8b2222;
      font-size: 7px;
      display: none;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <h1>THE PARTY</h1>
  <div class="subtitle">Analytics Dashboard - The Dungeon Arcade</div>

  <button id="refresh-btn" onclick="loadStats()">↺ REFRESH</button>
  <span id="last-updated"></span>

  <div id="error-msg">Could not connect to Orchestrator API. Ensure the main server is running.</div>

  <div class="stat-grid" id="stat-grid">
    <!-- populated by JS -->
  </div>

  <div class="section">
    <div class="section-title">Characters - Times Spoken</div>
    <div id="char-bars"></div>
  </div>

  <div class="section">
    <div class="section-title">Recent Triggers</div>
    <table class="trigger-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Type</th>
          <th>Trigger</th>
          <th>Characters</th>
          <th>Latency</th>
          <th>Cost</th>
        </tr>
      </thead>
      <tbody id="trigger-rows"></tbody>
    </table>
  </div>

  <script>
    const CHARACTER_COLOURS = {
      clauven:  '#7b68ee',
      geptima:  '#deb887',
      gemaux:   '#9370db',
      grokthar: '#6b8a3a',
      deepwilla:'#cd853f',
    };

    async function loadStats() {
      document.getElementById('error-msg').style.display = 'none';
      try {
        const res = await fetch('http://localhost:8766/api/stats');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderStats(data);
        document.getElementById('last-updated').textContent =
          'Updated: ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    function renderStats(data) {
      // Stat cards
      const grid = document.getElementById('stat-grid');
      grid.innerHTML = '';

      const cards = [
        { label: 'Total Triggers', value: data.total_triggers, sub: 'all time' },
        { label: 'Avg Responses/Scene', value: data.avg_responses_per_scene, sub: 'characters per trigger' },
        { label: 'Avg Latency', value: `${(data.avg_latency_ms / 1000).toFixed(1)}s`, sub: 'LLM generation time' },
        { label: 'Est. Total Cost', value: `$${data.total_estimated_cost_usd}`, sub: 'all providers combined' },
        { label: 'Tokens Used', value: (data.total_tokens_input + data.total_tokens_output).toLocaleString(), sub: `${data.total_tokens_input.toLocaleString()} in / ${data.total_tokens_output.toLocaleString()} out` },
        { label: 'Repair Events', value: data.repair_events, sub: 'output violations fixed' },
      ];

      for (const card of cards) {
        grid.innerHTML += `
          <div class="stat-card">
            <div class="stat-label">${card.label}</div>
            <div class="stat-value">${card.value}</div>
            <div class="stat-sub">${card.sub}</div>
          </div>`;
      }

      // Character bars
      const counts = data.character_speak_counts;
      const maxCount = Math.max(...Object.values(counts), 1);
      const order = ['clauven', 'geptima', 'gemaux', 'grokthar', 'deepwilla'];
      const charBars = document.getElementById('char-bars');
      charBars.innerHTML = '';

      for (const name of order) {
        const count = counts[name] || 0;
        const pct = (count / maxCount * 100).toFixed(0);
        const colour = CHARACTER_COLOURS[name] || '#CC5500';
        charBars.innerHTML += `
          <div class="bar-row">
            <div class="bar-label">${name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%; background:${colour};"></div>
            </div>
            <div class="bar-count">${count}</div>
          </div>`;
      }

      // Recent triggers
      const tbody = document.getElementById('trigger-rows');
      tbody.innerHTML = '';
      for (const t of data.recent_triggers) {
        const chars = (t.characters || [])
          .map(c => `<span class="char-pill" style="border-left:2px solid ${CHARACTER_COLOURS[c]||'#CC5500'}">${c}</span>`)
          .join('');
        const time = t.received_at
          ? new Date(t.received_at).toLocaleTimeString()
          : '-';
        tbody.innerHTML += `
          <tr>
            <td>${time}</td>
            <td><span class="type-badge ${t.type}">${t.type}</span></td>
            <td>${t.text}${t.text.length >= 60 ? '…' : ''}</td>
            <td>${chars}</td>
            <td>${(t.latency_ms / 1000).toFixed(1)}s</td>
            <td>$${(t.cost || 0).toFixed(4)}</td>
          </tr>`;
      }
    }

    // Load on open, auto-refresh every 30s
    loadStats();
    setInterval(loadStats, 30000);
  </script>

</body>
</html>
