<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overlay Test Harness</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #ccc; }
    button {
      margin: 4px;
      padding: 8px 16px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      cursor: pointer;
      font-family: monospace;
    }
    button:hover { background: #CC5500; color: white; }
    #log { margin-top: 20px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h3>The Party — Overlay Test Harness</h3>
  <p style="font-size:12px; color:#666; margin-bottom:16px;">
    Open overlay.html in OBS browser source, then use these buttons to test events.
    Requires orchestrator running (python -m party.main).
  </p>

  <div>
    <button onclick="send('speaking_start', 'clauven')">Clauven speaks</button>
    <button onclick="send('speaking_start', 'geptima')">Geptima speaks</button>
    <button onclick="send('speaking_start', 'gemaux')">Gemaux speaks</button>
    <button onclick="send('speaking_start', 'grokthar')">Grokthar speaks</button>
    <button onclick="send('speaking_start', 'deepwilla')">Deepwilla speaks</button>
  </div>
  <div style="margin-top:8px;">
    <button onclick="send('idle', null)">Idle (all silent)</button>
    <button onclick="runSequence()">Run full sequence</button>
  </div>

  <div id="log"></div>

  <script>
    const WS_URL = 'ws://localhost:8766';
    let ws = null;

    function log(msg) {
      document.getElementById('log').innerHTML =
        `<div>${new Date().toLocaleTimeString()} — ${msg}</div>` +
        document.getElementById('log').innerHTML;
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => log('Connected to orchestrator overlay server');
      ws.onclose = () => {
        log('Disconnected — retrying in 2s');
        setTimeout(connect, 2000);
      };
    }

    function send(event, character) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('Not connected');
        return;
      }
      // Send to overlay server which will broadcast to overlay.html
      ws.send(JSON.stringify({ event, character }));
      log(`Sent: ${event} → ${character || 'null'}`);
    }

    async function runSequence() {
      const chars = ['clauven', 'geptima', 'gemaux', 'grokthar', 'deepwilla'];
      for (const char of chars) {
        send('speaking_start', char);
        await new Promise(r => setTimeout(r, 2000));
        send('speaking_end', char);
        await new Promise(r => setTimeout(r, 500));
      }
      send('idle', null);
    }

    connect();
  </script>
</body>
</html>
